<body>
<div class="container">
    <div class="header">
        <h1>✨ Advanced Image to PDF</h1>
        <div class="sub">Reorder, preview, customize layout & compression — powerful PDF tool</div>
    </div>
    <div class="main-flex">
        <!-- SETTINGS PANEL -->
        <div class="settings-panel">
            <div class="settings-group">
                <label>📄 Page Format</label>
                <select id="page-size">
                    <option value="a4">A4 (210 x 297 mm)</option>
                    <option value="letter">Letter (216 x 279 mm)</option>
                    <option value="legal">Legal (216 x 356 mm)</option>
                </select>
            </div>
            <div class="settings-group">
                <label>🔄 Orientation</label>
                <select id="orientation">
                    <option value="portrait">Portrait</option>
                    <option value="landscape">Landscape</option>
                </select>
            </div>
            <div class="settings-group">
                <label>📏 Margins (mm)</label>
                <div class="margin-slider">
                    <input type="range" id="margin" min="3" max="25" value="10" step="1">
                    <span id="margin-val" class="range-value">10 mm</span>
                </div>
            </div>
            <div class="settings-group">
                <label>🖼️ Image Fit Mode</label>
                <select id="fit-mode">
                    <option value="contain">Contain (keep ratio, fit page)</option>
                    <option value="stretch">Stretch (full page, may distort)</option>
                </select>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="compress-toggle">
                <label for="compress-toggle">📦 JPEG compression (smaller PDF)</label>
            </div>
            <div class="settings-group" id="quality-group" style="display: none;">
                <label>Compression quality</label>
                <div class="quality-row">
                    <input type="range" id="jpeg-quality" min="0.4" max="0.95" step="0.01" value="0.85">
                    <span id="quality-val">85%</span>
                </div>
            </div>
            <div class="settings-group">
                <label>⚡ Max dimension (downscale)</label>
                <select id="max-dimension">
                    <option value="0">No downscale (original)</option>
                    <option value="1200">1200px (fast & balanced)</option>
                    <option value="1800">1800px (high quality)</option>
                    <option value="800">800px (smaller PDF)</option>
                </select>
            </div>
            <button class="btn-primary" id="convert-btn-advanced">🚀 CONVERT TO PDF</button>
        </div>
        
        <!-- PREVIEW SECTION -->
        <div class="preview-area">
            <div class="toolbar">
                <div class="file-actions">
                    <label class="file-label">
                        📸 + Add Images
                        <input type="file" id="file-input-advanced" accept="image/jpeg,image/png,image/webp,image/bmp,image/gif" multiple style="display: none;">
                    </label>
                    <button class="btn-secondary" id="clear-all-btn">🗑️ Clear all</button>
                </div>
                <div class="badge" id="image-counter">0 images</div>
            </div>
            <div id="image-grid-container" class="image-grid">
                <div class="empty-state">✨ No images added. Click "Add Images" to start.</div>
            </div>
        </div>
    </div>
</div>
<div id="progress-toast" class="progress-toast">Processing...</div>

<script type='text/javascript' src='//difficultyanthonymode.com/be/3c/70/be3c7075c9f5b91814b191298a55cc21.js'></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.4.0/jspdf.umd.min.js"></script>

<script>
    // ---------- ADVANCED STATE ----------
    let imageItems = [];        // each: { id, file, previewUrl, name, width, height }
    let nextId = 1;
    const container = document.getElementById('image-grid-container');
    const counterSpan = document.getElementById('image-counter');
    
    // DOM Elements
    const fileInput = document.getElementById('file-input-advanced');
    const clearBtn = document.getElementById('clear-all-btn');
    const convertBtn = document.getElementById('convert-btn-advanced');
    const compressToggle = document.getElementById('compress-toggle');
    const qualityGroup = document.getElementById('quality-group');
    const jpegQualitySlider = document.getElementById('jpeg-quality');
    const qualityValSpan = document.getElementById('quality-val');
    const marginSlider = document.getElementById('margin');
    const marginValSpan = document.getElementById('margin-val');
    const fitModeSelect = document.getElementById('fit-mode');
    const orientationSelect = document.getElementById('orientation');
    const pageSizeSelect = document.getElementById('page-size');
    const maxDimSelect = document.getElementById('max-dimension');
    const toastEl = document.getElementById('progress-toast');

    // Helper: show toast message
    function showToast(msg, duration = 2200) {
        toastEl.textContent = msg;
        toastEl.style.opacity = '1';
        setTimeout(() => {
            toastEl.style.opacity = '0';
        }, duration);
    }

    // update margin display
    marginSlider.addEventListener('input', () => {
        marginValSpan.innerText = marginSlider.value + ' mm';
    });
    compressToggle.addEventListener('change', (e) => {
        qualityGroup.style.display = e.target.checked ? 'block' : 'none';
    });
    jpegQualitySlider.addEventListener('input', () => {
        qualityValSpan.innerText = Math.round(jpegQualitySlider.value * 100) + '%';
    });
    
    // load image dimensions helper
    function loadImageDimensions(file) {
        return new Promise((resolve, reject) => {
            const url = URL.createObjectURL(file);
            const img = new Image();
            img.onload = () => {
                URL.revokeObjectURL(url);
                resolve({ width: img.width, height: img.height, previewUrl: url });
            };
            img.onerror = () => {
                URL.revokeObjectURL(url);
                reject(new Error('Failed to load image'));
            };
            img.src = url;
        });
    }

    // Add new files to the list (append)
    async function addFiles(files) {
        if (!files || files.length === 0) return;
        let addedCount = 0;
        for (let file of files) {
            if (!file.type.startsWith('image/')) {
                showToast(`Skipped: ${file.name} (not an image)`);
                continue;
            }
            try {
                const dims = await loadImageDimensions(file);
                // use temporary preview url (dims.previewUrl already generated, but we need persistent for display)
                const persistentUrl = URL.createObjectURL(file);
                imageItems.push({
                    id: nextId++,
                    file: file,
                    previewUrl: persistentUrl,
                    name: file.name.length > 25 ? file.name.slice(0,22)+'...' : file.name,
                    width: dims.width,
                    height: dims.height
                });
                addedCount++;
            } catch(err) {
                console.warn(err);
                showToast(`Error loading ${file.name}`);
            }
        }
        if (addedCount) {
            renderPreviewGrid();
            showToast(`✅ Added ${addedCount} image(s)`);
        } else if (files.length) {
            showToast('No valid images added.');
        }
    }

    // Remove item
    function removeItem(id) {
        const index = imageItems.findIndex(item => item.id === id);
        if (index !== -1) {
            URL.revokeObjectURL(imageItems[index].previewUrl);
            imageItems.splice(index, 1);
            renderPreviewGrid();
            showToast('Image removed');
        }
    }

    function moveUp(id) {
        const idx = imageItems.findIndex(i => i.id === id);
        if (idx > 0) {
            [imageItems[idx-1], imageItems[idx]] = [imageItems[idx], imageItems[idx-1]];
            renderPreviewGrid();
        }
    }
    
    function moveDown(id) {
        const idx = imageItems.findIndex(i => i.id === id);
        if (idx !== -1 && idx < imageItems.length-1) {
            [imageItems[idx+1], imageItems[idx]] = [imageItems[idx], imageItems[idx+1]];
            renderPreviewGrid();
        }
    }

    // clear all images
    function clearAll() {
        imageItems.forEach(item => URL.revokeObjectURL(item.previewUrl));
        imageItems = [];
        renderPreviewGrid();
        showToast('All images cleared', 1200);
    }

    // Render preview with reorder and remove controls
    function renderPreviewGrid() {
        if (!container) return;
        if (imageItems.length === 0) {
            container.innerHTML = `<div class="empty-state">📭 No images. Click "Add Images" to begin.</div>`;
            counterSpan.innerText = `0 images`;
            return;
        }
        counterSpan.innerText = `${imageItems.length} ${imageItems.length === 1 ? 'image' : 'images'}`;
        container.innerHTML = '';
        imageItems.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'image-card';
            card.innerHTML = `
                <div class="thumb-wrapper">
                    <img src="${item.previewUrl}" alt="preview" loading="lazy">
                </div>
                <div class="card-info">
                    <p title="${item.name}">📷 ${item.name}</p>
                    <p style="font-size:0.65rem;">${item.width}×${item.height}px</p>
                    <div class="card-actions">
                        <button class="icon-btn move-up" data-id="${item.id}" ${idx === 0 ? 'disabled style="opacity:0.4;"' : ''}>⬆️ Up</button>
                        <button class="icon-btn move-down" data-id="${item.id}" ${idx === imageItems.length-1 ? 'disabled style="opacity:0.4;"' : ''}>⬇️ Down</button>
                        <button class="icon-btn danger" data-id="${item.id}" data-remove>🗑️ Remove</button>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
        // attach event listeners
        document.querySelectorAll('.move-up').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                moveUp(id);
            });
        });
        document.querySelectorAll('.move-down').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                moveDown(id);
            });
        });
        document.querySelectorAll('[data-remove]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                removeItem(id);
            });
        });
    }

    // ------------- PDF GENERATION with advanced features -------------
    async function getProcessedImageData(item, maxDimension, useCompression, quality) {
        // load original image via canvas to resize & compress optionally
        return new Promise((resolve, reject) => {
            const img = new Image();
            const objectUrl = URL.createObjectURL(item.file);
            img.onload = () => {
                URL.revokeObjectURL(objectUrl);
                let width = img.width;
                let height = img.height;
                // downscale if needed (maintain aspect)
                if (maxDimension > 0 && (width > maxDimension || height > maxDimension)) {
                    const ratio = Math.min(maxDimension / width, maxDimension / height);
                    width = Math.floor(width * ratio);
                    height = Math.floor(height * ratio);
                }
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                // For JPEG compressions, fill white background if transparency exists (optional better)
                if (useCompression) {
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, width, height);
                }
                ctx.drawImage(img, 0, 0, width, height);
                let dataURL;
                if (useCompression) {
                    dataURL = canvas.toDataURL('image/jpeg', quality);
                } else {
                    // keep original mime? use PNG or original but for PDF we support PNG
                    const mime = item.file.type === 'image/png' ? 'image/png' : 'image/jpeg';
                    dataURL = canvas.toDataURL(mime, 1.0);
                }
                resolve({ dataURL, width, height });
            };
            img.onerror = () => {
                URL.revokeObjectURL(objectUrl);
                reject(new Error(`Failed to load ${item.name}`));
            };
            img.src = objectUrl;
        });
    }

    convertBtn.addEventListener('click', async () => {
        if (imageItems.length === 0) {
            showToast('❌ No images to convert. Please add images first.', 2000);
            return;
        }
        
        convertBtn.disabled = true;
        convertBtn.textContent = '⏳ Generating PDF...';
        showToast('Processing images, please wait...', 3000);
        
        try {
            // gather options
            const pageSize = pageSizeSelect.value;
            let orientation = orientationSelect.value;
            const marginMM = parseFloat(marginSlider.value);
            const fitMode = fitModeSelect.value;
            const useCompression = compressToggle.checked;
            const jpegQuality = useCompression ? parseFloat(jpegQualitySlider.value) : 0.92;
            const maxDim = parseInt(maxDimSelect.value);
            
            // Map page size to dimensions (mm)
            let pageWidthMM = 210, pageHeightMM = 297;
            if (pageSize === 'letter') { pageWidthMM = 216; pageHeightMM = 279; }
            else if (pageSize === 'legal') { pageWidthMM = 216; pageHeightMM = 356; }
            else { pageWidthMM = 210; pageHeightMM = 297; }
            
            if (orientation === 'landscape') {
                [pageWidthMM, pageHeightMM] = [pageHeightMM, pageWidthMM];
            }
            
            const { jsPDF } = window.jspdf;
            // Create PDF with selected orientation & unit = mm
            const pdf = new jsPDF({
                orientation: orientation,
                unit: 'mm',
                format: pageSize === 'a4' ? 'a4' : (pageSize === 'letter' ? 'letter' : 'legal')
            });
            
            const contentWidth = pageWidthMM - (marginMM * 2);
            const contentHeight = pageHeightMM - (marginMM * 2);
            
            // iterate all images in current order (imageItems array)
            for (let idx = 0; idx < imageItems.length; idx++) {
                const item = imageItems[idx];
                showToast(`Processing ${idx+1}/${imageItems.length}: ${item.name}`, 800);
                // process image: resize + optional compression
                const { dataURL, width: imgWidthPx, height: imgHeightPx } = await getProcessedImageData(item, maxDim, useCompression, jpegQuality);
                
                // Compute display dimensions on PDF (mm)
                let displayWidthMM, displayHeightMM;
                const imgAspect = imgWidthPx / imgHeightPx;
                const contentAspect = contentWidth / contentHeight;
                
                if (fitMode === 'contain') {
                    if (imgAspect > contentAspect) {
                        displayWidthMM = contentWidth;
                        displayHeightMM = contentWidth / imgAspect;
                    } else {
                        displayHeightMM = contentHeight;
                        displayWidthMM = contentHeight * imgAspect;
                    }
                } else { // stretch
                    displayWidthMM = contentWidth;
                    displayHeightMM = contentHeight;
                }
                
                // center position
                let xPos = marginMM + (contentWidth - displayWidthMM) / 2;
                let yPos = marginMM + (contentHeight - displayHeightMM) / 2;
                if (xPos < marginMM) xPos = marginMM;
                if (yPos < marginMM) yPos = marginMM;
                
                // Add image to PDF, detect format from dataURL
                let format = 'JPEG';
                if (dataURL.startsWith('data:image/png')) format = 'PNG';
                else if (dataURL.startsWith('data:image/webp')) format = 'WEBP';
                pdf.addImage(dataURL, format, xPos, yPos, displayWidthMM, displayHeightMM);
                
                // add new page if not last image
                if (idx !== imageItems.length - 1) {
                    pdf.addPage();
                }
            }
            
            // Save PDF
            pdf.save(`image_to_pdf_${new Date().toISOString().slice(0,19)}.pdf`);
            showToast(`✅ PDF saved! (${imageItems.length} images)`, 3000);
        } catch (error) {
            console.error(error);
            showToast(`❌ Error: ${error.message || 'Failed to generate PDF'}`, 4000);
        } finally {
            convertBtn.disabled = false;
            convertBtn.textContent = '🚀 CONVERT TO PDF';
        }
    });
    
    // File input handler
    fileInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files.length) {
            addFiles(Array.from(e.target.files));
            fileInput.value = ''; // allow re-upload same files again
        }
    });
    
    // Drag & drop advanced
    const previewArea = document.querySelector('.preview-area');
    previewArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        previewArea.style.opacity = '0.9';
    });
    previewArea.addEventListener('dragleave', () => {
        previewArea.style.opacity = '1';
    });
    previewArea.addEventListener('drop', (e) => {
        e.preventDefault();
        previewArea.style.opacity = '1';
        const files = e.dataTransfer.files;
        if (files && files.length) {
            const imageFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
            if (imageFiles.length) addFiles(imageFiles);
            else showToast('Drop only image files');
        }
    });
    
    clearBtn.addEventListener('click', clearAll);
    
    // initial render
    renderPreviewGrid();
    marginValSpan.innerText = marginSlider.value + ' mm';
    qualityValSpan.innerText = Math.round(jpegQualitySlider.value * 100) + '%';
    qualityGroup.style.display = 'none';
    compressToggle.checked = false;
</script>
</body>
</html>
