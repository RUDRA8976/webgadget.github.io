<!DOCTYPE html>
<html lang="en">
<head>
   <script type='text/javascript' src='//difficultyanthonymode.com/be/3c/70/be3c7075c9f5b91814b191298a55cc21.js'></script>
   <script type='text/javascript' src='//difficultyanthonymode.com/be/3c/70/be3c7075c9f5b91814b191298a55cc21.js'></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Background Remover</title>
    <!-- ✅ Link favicon from 'favicon' folder -->
    <link rel="icon" href="favicon/favicon.png" type="image/png"> 
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            text-align: center;
            background: linear-gradient(135deg, #84fab0, #8fd3f4);
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        h2 {
            color: #333;
            margin-bottom: 15px;
        }
        .upload-box {
            border: 2px dashed #007bff;
            padding: 20px;
            cursor: pointer;
            border-radius: 10px;
            background: #f8f9fa;
        }
        .upload-box:hover {
            background: #e9ecef;
        }
        input {
            display: none;
        }
        label {
            display: block;
            background: #007bff;
            color: white;
            padding: 12px;
            margin-top: 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        img {
            max-width: 100%;
            margin-top: 20px;
            display: none;
            border-radius: 5px;
        }
        #download {
            display: none;
            background: #28a745;
            color: white;
            padding: 12px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 16px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Remove Image Background Instantly</h2>
        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <p>Click to Upload or Drag & Drop</p>
        </div>
        <input type="file" id="fileInput" accept="image/*">
        <label for="fileInput">Upload Image</label>
        <img id="preview">
        <a id="download">Download</a>
    </div>
   <script type='text/javascript' src='//difficultyanthonymode.com/be/3c/70/be3c7075c9f5b91814b191298a55cc21.js'></script> 
    <script>
        document.getElementById('fileInput').addEventListener('change', async function(event) {
            const file = event.target.files[0];
            if (!file) return;

            let formData = new FormData();
            formData.append("image_file", file);
            formData.append("size", "auto");

            const API_KEY = "CPR5m4i2xVZKSpPnQtidZoLd"

            const response = await fetch("https://api.remove.bg/v1.0/removebg", {
                method: "POST",
                headers: { "X-Api-Key": API_KEY },
                body: formData
            });

            if (!response.ok) {
                alert("Error removing background. Check API key or try again.");
                return;
            }

            const data = await response.blob();
            const url = URL.createObjectURL(data);

            document.getElementById("preview").src = url;
            document.getElementById("preview").style.display = "block";

            document.getElementById("download").href = url;
            document.getElementById("download").download = "no-bg.png";
            document.getElementById("download").style.display = "inline-block";
        });
    </script>
</body>
</html>
