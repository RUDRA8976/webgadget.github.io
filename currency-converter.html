<!DOCTYPE html>
<html lang="en">
<head>
    <script type='text/javascript' src='//hootpreceding.com/75/37/67/7537671fc8b8445af473b6f7f5566a17.js'></script>
    <script type='text/javascript' src='//hootpreceding.com/75/37/67/7537671fc8b8445af473b6f7f5566a17.js'></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
<link rel="icon" type="image/png" href="favicon.logo.png"> 
    <style>
        /* General styling for body */
        body {
            font-family: Arial, sans-serif;
            background-color: white;
            color: #5C4033;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Container for the converter */
        .converter-container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* Header styling */
        h1 {
            color: #5C4033;
            margin-bottom: 20px;
            font-size: 24px;
        }

        /* Styling for form elements */
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #5C4033;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #5C4033;
            border-radius: 5px;
            background-color: white;
            color: #5C4033;
            font-size: 16px;
            box-sizing: border-box;
        }

        /* Button styling */
        button {
            background-color: #5C4033;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #4a3328;
        }

        /* Output and error message styling */
        #result, #error {
            margin-top: 20px;
            font-size: 16px;
            color: #5C4033;
        }

        #error {
            color: red;
        }

        /* Responsive design for smaller screens */
        @media (max-width: 600px) {
            .converter-container {
                padding: 15px;
            }

            h1 {
                font-size: 20px;
            }

            input, select, button {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="converter-container">
        <h1>Currency Converter</h1>
        <div class="form-group">
            <label for="amount">Amount</label>
            <input type="number" id="amount" placeholder="Enter amount" step="any">
        </div>
        <div class="form-group">
            <label for="fromCurrency">From Currency</label>
            <select id="fromCurrency">
                <option value="" disabled selected>Select currency</option>
                <option value="USD">USD - US Dollar</option>
                <option value="EUR">EUR - Euro</option>
                <option value="INR">INR - Indian Rupee</option>
                <option value="GBP">GBP - British Pound</option>
                <option value="JPY">JPY - Japanese Yen</option>
            </select>
        </div>
        <div class="form-group">
            <label for="toCurrency">To Currency</label>
            <select id="toCurrency">
                <option value="" disabled selected>Select currency</option>
                <option value="USD">USD - US Dollar</option>
                <option value="EUR">EUR - Euro</option>
                <option value="INR">INR - Indian Rupee</option>
                <option value="GBP">GBP - British Pound</option>
                <option value="JPY">JPY - Japanese Yen</option>
            </select>
        </div>
        <button onclick="convertCurrency()">Convert</button>
        <div id="result"></div>
        <div id="error"></div>
    </div>

    <script>
        // Static exchange rates (base: USD, as of a sample date)
        const exchangeRates = {
            USD: 1,
            EUR: 0.92,
            INR: 83.5,
            GBP: 0.78,
            JPY: 155.0
        };

        // Function to convert currency
        function convertCurrency() {
            // Get DOM elements
            const amount = document.getElementById('amount').value;
            const fromCurrency = document.getElementById('fromCurrency').value;
            const toCurrency = document.getElementById('toCurrency').value;
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');

            // Clear previous messages
            resultDiv.textContent = '';
            errorDiv.textContent = '';

            // Validate inputs
            if (!amount || amount <= 0) {
                errorDiv.textContent = 'Please enter a valid amount greater than 0.';
                return;
            }
            if (!fromCurrency) {
                errorDiv.textContent = 'Please select a source currency.';
                return;
            }
            if (!toCurrency) {
                errorDiv.textContent = 'Please select a target currency.';
                return;
            }
            if (fromCurrency === toCurrency) {
                errorDiv.textContent = 'Source and target currencies must be different.';
                return;
            }

            // Perform conversion
            const amountNum = parseFloat(amount);
            // Convert to USD first, then to target currency
            const amountInUSD = amountNum / exchangeRates[fromCurrency];
            const convertedAmount = amountInUSD * exchangeRates[toCurrency];

            // Display result with 2 decimal places
            resultDiv.textContent = `${amountNum} ${fromCurrency} = ${convertedAmount.toFixed(2)} ${toCurrency}`;
        }
    </script>
</body>
</html>
