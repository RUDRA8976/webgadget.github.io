<!DOCTYPE html>
<html lang="en">
<head>
  <script type='text/javascript' src='//hootpreceding.com/75/37/67/7537671fc8b8445af473b6f7f5566a17.js'></script>
  <script type='text/javascript' src='//hootpreceding.com/75/37/67/7537671fc8b8445af473b6f7f5566a17.js'></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Image Resizer & Compressor</title>
<link rel="icon" type="image/png" href="favicon.logo.png">  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    }

    body {
      background-color: #f0f4f8;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background-color: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
      max-width: 700px;
      width: 100%;
      text-align: center;
    }

    h1 {
      color: #007bff;
      font-size: 1.8rem;
      margin-bottom: 20px;
    }

    .upload-area {
      border: 2px dashed #007bff;
      padding: 25px;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      margin-bottom: 20px;
    }

    .upload-area:hover, .upload-area.dragover {
      background-color: #e6f0ff;
    }

    .upload-area p {
      color: #666;
      font-size: 1rem;
    }

    #imagePreview {
      max-width: 100%;
      max-height: 300px;
      margin: 20px 0;
      border-radius: 8px;
      object-fit: contain;
      display: none;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-size: 0.9rem;
      color: #333;
      text-align: left;
    }

    input[type="number"], button {
      padding: 10px;
      border: 1px solid #007bff;
      border-radius: 6px;
      font-size: 1rem;
      outline: none;
    }

    input[type="number"] {
      width: 100%;
    }

    input[type="checkbox"] {
      margin-left: 10px;
    }

    button {
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      transition: background-color 0.3s ease;
      grid-column: span 2;
    }

    button:hover {
      background-color: #0056b3;
    }

    button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }

    .image-info {
      color: #666;
      font-size: 0.9rem;
      margin-top: 10px;
    }

    .error {
      color: #d32f2f;
      font-size: 0.9rem;
      margin-top: 10px;
      display: none;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      h1 {
        font-size: 1.5rem;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      button {
        grid-column: span 1;
      }

      .upload-area {
        padding: 15px;
      }

      .upload-area p {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Smart Image Resizer & Compressor</h1>
    <div class="upload-area" id="uploadArea">
      <p>Click or Drag & Drop an image (JPG, PNG, WEBP)</p>
      <input type="file" id="imageInput" accept="image/jpeg,image/png,image/webp" style="display: none;">
    </div>
    <img id="imagePreview" alt="Image Preview">
    <div class="controls">
      <div class="control-group">
        <label for="widthInput">Width (px)</label>
        <input type="number" id="widthInput" placeholder="Enter width" min="1">
      </div>
      <div class="control-group">
        <label for="heightInput">Height (px)</label>
        <input type="number" id="heightInput" placeholder="Enter height" min="1">
      </div>
      <div class="control-group">
        <label for="lockAspectRatio">
          Lock Aspect Ratio
          <input type="checkbox" id="lockAspectRatio" checked>
        </label>
      </div>
      <button id="convertBtn" disabled>Resize & Compress</button>
    </div>
    <div class="image-info" id="imageInfo">Image Info: --</div>
    <div class="error" id="errorMessage">Unsupported file type. Please use JPG, PNG, or WEBP.</div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const imageInput = document.getElementById('imageInput');
    const imagePreview = document.getElementById('imagePreview');
    const widthInput = document.getElementById('widthInput');
    const heightInput = document.getElementById('heightInput');
    const lockAspectRatio = document.getElementById('lockAspectRatio');
    const convertBtn = document.getElementById('convertBtn');
    const imageInfo = document.getElementById('imageInfo');
    const errorMessage = document.getElementById('errorMessage');

    let currentImage = null;
    let originalWidth = 0;
    let originalHeight = 0;
    let originalFileSize = 0;
    let aspectRatio = 1;

    // Handle click to open file picker
    uploadArea.addEventListener('click', () => imageInput.click());

    // Handle drag and drop
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      handleFile(file);
    });

    // Handle file selection
    imageInput.addEventListener('change', () => {
      const file = imageInput.files[0];
      handleFile(file);
    });

    function handleFile(file) {
      if (file && ['image/jpeg', 'image/png', 'image/webp'].includes(file.type)) {
        errorMessage.style.display = 'none';
        originalFileSize = file.size;
        const reader = new FileReader();
        reader.onload = (e) => {
          currentImage = new Image();
          currentImage.src = e.target.result;
          currentImage.onload = () => {
            imagePreview.src = currentImage.src;
            imagePreview.style.display = 'block';
            originalWidth = currentImage.width;
            originalHeight = currentImage.height;
            aspectRatio = originalWidth / originalHeight;
            widthInput.value = originalWidth;
            heightInput.value = originalHeight;
            imageInfo.textContent = `Image Info: ${originalWidth}x${originalHeight}px, ${(originalFileSize / 1024).toFixed(2)} KB, ${file.type.split('/')[1].toUpperCase()}`;
            convertBtn.disabled = false;
          };
        };
        reader.readAsDataURL(file);
      } else {
        errorMessage.style.display = 'block';
        imagePreview.style.display = 'none';
        imageInfo.textContent = 'Image Info: --';
        convertBtn.disabled = true;
      }
    }

    // Maintain aspect ratio
    widthInput.addEventListener('input', () => {
      if (lockAspectRatio.checked && widthInput.value) {
        heightInput.value = Math.round(widthInput.value / aspectRatio);
      }
    });

    heightInput.addEventListener('input', () => {
      if (lockAspectRatio.checked && heightInput.value) {
        widthInput.value = Math.round(heightInput.value * aspectRatio);
      }
    });

    // Handle resize and compress
    convertBtn.addEventListener('click', () => {
      if (!currentImage) return;

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const width = widthInput.value ? parseInt(widthInput.value) : originalWidth;
      const height = heightInput.value ? parseInt(heightInput.value) : originalHeight;

      canvas.width = width;
      canvas.height = height;
      ctx.drawImage(currentImage, 0, 0, width, height);

      const mimeType = currentImage.src.startsWith('data:image/webp') ? 'image/webp' : 'image/jpeg';
      const extension = mimeType.split('/')[1];
      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `resized-image.${extension}`;
        a.click();
        URL.revokeObjectURL(url);
        imageInfo.textContent = `Image Info: ${width}x${height}px, ${(blob.size / 1024).toFixed(2)} KB (Original: ${(originalFileSize / 1024).toFixed(2)} KB), ${extension.toUpperCase()}`;
      }, mimeType, 0.9);
    });
  </script>
</body>
</html>
