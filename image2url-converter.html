<!DOCTYPE html>
<html lang="en">
<head>
  <script type='text/javascript' src='//hootpreceding.com/e8/57/15/e85715ce383e5db16c256343461622a7.js'></script>
  <script type='text/javascript' src='//hootpreceding.com/e8/57/15/e85715ce383e5db16c256343461622a7.js'></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instant Image to URL Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- ✅ Link favicon from 'favicon' folder -->
  <link rel="icon" href="favicon/favicon.png" type="image/png"> 
  
  <style>
    #dropZone.highlight {
      border-color: #8a2be2;
      background-color: rgba(138, 43, 226, 0.1);
    }
    #urlOutput::-webkit-scrollbar {
      width: 8px;
    }
    #urlOutput::-webkit-scrollbar-thumb {
      background-color: #8a2be2;
      border-radius: 4px;
    }
  </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 flex items-center justify-center min-h-screen p-4 transition-colors duration-300">
  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-6 w-full max-w-md">
    <h1 class="text-2xl font-bold text-center text-gray-800 dark:text-white mb-4">Instant Image to URL Generator</h1>
    
    <!-- Drag and Drop Area -->
    <div id="dropZone" class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg p-6 text-center cursor-pointer hover:border-violet-500 transition-colors">
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" class="hidden">
      <p class="text-gray-600 dark:text-gray-300">Drag & drop your image here or click to upload (JPG, PNG, WEBP)</p>
    </div>

    <!-- Preview Area -->
    <div id="preview" class="mt-4 hidden">
      <h2 class="text-lg font-semibold text-gray-800 dark:text-white">Preview</h2>
      <img id="previewImage" class="w-full h-auto rounded-lg mt-2 max-h-64 object-contain" alt="Image Preview">
    </div>

    <!-- URL Output -->
    <div id="urlSection" class="mt-4 hidden">
      <h2 class="text-lg font-semibold text-gray-800 dark:text-white">Generated URL</h2>
      <div class="relative">
        <textarea id="urlOutput" readonly class="w-full p-2 border rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white resize-none h-24"></textarea>
        <button id="copyButton" class="absolute right-2 top-2 bg-violet-600 text-white px-3 py-1 rounded-lg hover:bg-violet-700">Copy</button>
      </div>
      <div class="mt-2 flex items-center">
        <input type="checkbox" id="toggleUrl" class="mr-2">
        <label for="toggleUrl" class="text-gray-600 dark:text-gray-300">Show full URL</label>
      </div>
      <div class="mt-2">
        <button id="embedButton" class="bg-violet-600 text-white px-4 py-2 rounded-lg hover:bg-violet-700">Get Embed Code</button>
      </div>
    </div>

    <!-- Dark Mode Toggle -->
    <div class="mt-4 flex justify-end">
      <button id="darkModeToggle" class="text-gray-600 dark:text-gray-300 hover:text-violet-600 dark:hover:text-violet-400">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
      </button>
    </div>

    <!-- Privacy Note -->
    <p class="mt-4 text-sm text-gray-500 dark:text-gray-400 text-center">
      🔒 No images are uploaded. All processing is done locally in your browser.
    </p>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const preview = document.getElementById('preview');
    const previewImage = document.getElementById('previewImage');
    const urlSection = document.getElementById('urlSection');
    const urlOutput = document.getElementById('urlOutput');
    const copyButton = document.getElementById('copyButton');
    const toggleUrl = document.getElementById('toggleUrl');
    const embedButton = document.getElementById('embedButton');
    const darkModeToggle = document.getElementById('darkModeToggle');

    // Drag and Drop Handlers
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('highlight');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('highlight'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('highlight');
      const file = e.dataTransfer.files[0];
      handleFile(file);
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      handleFile(file);
    });

    function handleFile(file) {
      if (file && ['image/jpeg', 'image/png', 'image/webp'].includes(file.type)) {
        const reader = new FileReader();
        reader.onload = () => {
          previewImage.src = reader.result;
          preview.classList.remove('hidden');
          urlOutput.value = reader.result;
          urlSection.classList.remove('hidden');
          toggleUrl.checked = false;
          truncateUrl();
        };
        reader.readAsDataURL(file);
      }
    }

    // Truncate URL for display
    function truncateUrl() {
      const fullUrl = urlOutput.value;
      if (toggleUrl.checked) {
        urlOutput.value = fullUrl;
      } else {
        urlOutput.value = fullUrl.length > 100 ? fullUrl.substring(0, 100) + '...' : fullUrl;
      }
    }

    toggleUrl.addEventListener('change', truncateUrl);

    // Copy to Clipboard
    copyButton.addEventListener('click', () => {
      urlOutput.select();
      navigator.clipboard.writeText(urlOutput.value);
      copyButton.textContent = 'Copied!';
      setTimeout(() => (copyButton.textContent = 'Copy'), 2000);
    });

    // Generate Embed Code
    embedButton.addEventListener('click', () => {
      const embedCode = `<img src="${urlOutput.value}" alt="Embedded Image" />`;
      urlOutput.value = embedCode;
      urlSection.classList.remove('hidden');
      toggleUrl.checked = false;
      truncateUrl();
    });

    // Dark Mode Toggle
    darkModeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
    });
  </script>
</body>
</html>
