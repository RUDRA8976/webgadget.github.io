<!DOCTYPE html>
<html lang="en">
<head>
  <script type='text/javascript' src='//hootpreceding.com/75/37/67/7537671fc8b8445af473b6f7f5566a17.js'></script>
  <script type='text/javascript' src='//hootpreceding.com/75/37/67/7537671fc8b8445af473b6f7f5566a17.js'></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Converter Tool</title>
  <!-- ✅ Link favicon from 'favicon' folder -->
  <link rel="icon" href="favicon/favicon.png" type="image/png"> 
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #f0f4f8;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      max-width: 800px;
      width: 100%;
      text-align: center;
    }

    h1 {
      color: #007bff;
      margin-bottom: 20px;
      font-size: 2rem;
    }

    .upload-area {
      border: 2px dashed #007bff;
      padding: 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s;
      margin-bottom: 20px;
    }

    .upload-area:hover, .upload-area.dragover {
      background-color: #e6f0ff;
    }

    .upload-area p {
      color: #666;
      font-size: 1.1rem;
    }

    #imagePreview {
      max-width: 100%;
      max-height: 300px;
      margin: 20px 0;
      display: none;
      border-radius: 8px;
      object-fit: contain;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      margin-bottom: 20px;
    }

    select, input[type="number"], button {
      padding: 10px;
      border: 1px solid #007bff;
      border-radius: 5px;
      font-size: 1rem;
      outline: none;
    }

    button {
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #0056b3;
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .file-size {
      color: #666;
      margin-top: 10px;
      font-size: 0.9rem;
    }

    .error {
      color: #d32f2f;
      margin-top: 10px;
      display: none;
    }

    @media (max-width: 600px) {
      .container {
        padding: 15px;
      }

      h1 {
        font-size: 1.5rem;
      }

      .controls {
        flex-direction: column;
        align-items: stretch;
      }

      select, input[type="number"], button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Image Converter Tool</h1>
    <div class="upload-area" id="uploadArea">
      <p>Click or Drag & Drop an image (JPG, PNG, WEBP)</p>
      <input type="file" id="imageInput" accept="image/jpeg,image/png,image/webp" style="display: none;">
    </div>
    <img id="imagePreview" alt="Image Preview">
    <div class="controls">
      <select id="formatSelect">
        <option value="image/jpeg">JPG</option>
        <option value="image/png">PNG</option>
        <option value="image/webp">WEBP</option>
      </select>
      <input type="number" id="widthInput" placeholder="Width (px)" min="1">
      <input type="number" id="heightInput" placeholder="Height (px)" min="1">
      <div class="slider-container">
        <label for="qualitySlider">Quality: </label>
        <input type="range" id="qualitySlider" min="10" max="100" value="90">
        <span id="qualityValue">90%</span>
      </div>
      <button id="convertBtn" disabled>Convert & Download</button>
    </div>
    <div class="file-size" id="fileSize">File size: --</div>
    <div class="error" id="errorMessage">Unsupported file type. Please use JPG, PNG, or WEBP.</div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const imageInput = document.getElementById('imageInput');
    const imagePreview = document.getElementById('imagePreview');
    const formatSelect = document.getElementById('formatSelect');
    const widthInput = document.getElementById('widthInput');
    const heightInput = document.getElementById('heightInput');
    const qualitySlider = document.getElementById('qualitySlider');
    const qualityValue = document.getElementById('qualityValue');
    const convertBtn = document.getElementById('convertBtn');
    const fileSize = document.getElementById('fileSize');
    const errorMessage = document.getElementById('errorMessage');

    let currentImage = null;
    let originalFileSize = 0;

    // Update quality display
    qualitySlider.addEventListener('input', () => {
      qualityValue.textContent = `${qualitySlider.value}%`;
    });

    // Handle click to open file picker
    uploadArea.addEventListener('click', () => imageInput.click());

    // Handle drag and drop
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      handleFile(file);
    });

    // Handle file selection
    imageInput.addEventListener('change', () => {
      const file = imageInput.files[0];
      handleFile(file);
    });

    function handleFile(file) {
      if (file && ['image/jpeg', 'image/png', 'image/webp'].includes(file.type)) {
        errorMessage.style.display = 'none';
        originalFileSize = file.size;
        fileSize.textContent = `File size: ${(originalFileSize / 1024).toFixed(2)} KB`;
        const reader = new FileReader();
        reader.onload = (e) => {
          currentImage = new Image();
          currentImage.src = e.target.result;
          currentImage.onload = () => {
            imagePreview.src = currentImage.src;
            imagePreview.style.display = 'block';
            convertBtn.disabled = false;
          };
        };
        reader.readAsDataURL(file);
      } else {
        errorMessage.style.display = 'block';
        imagePreview.style.display = 'none';
        convertBtn.disabled = true;
        fileSize.textContent = 'File size: --';
      }
    }

    // Handle conversion and download
    convertBtn.addEventListener('click', () => {
      if (!currentImage) return;

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      let width = currentImage.width;
      let height = currentImage.height;

      // Handle resize
      if (widthInput.value && heightInput.value) {
        width = parseInt(widthInput.value);
        height = parseInt(heightInput.value);
      }

      canvas.width = width;
      canvas.height = height;
      ctx.drawImage(currentImage, 0, 0, width, height);

      const quality = qualitySlider.value / 100;
      const mimeType = formatSelect.value;
      const extension = mimeType.split('/')[1];
      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `converted-image.${extension}`;
        a.click();
        URL.revokeObjectURL(url);
        fileSize.textContent = `File size: ${(blob.size / 1024).toFixed(2)} KB (Original: ${(originalFileSize / 1024).toFixed(2)} KB)`;
      }, mimeType, quality);
    });
  </script>
</body>
</html>
