<!DOCTYPE html>
<html lang="en">
<head>
  <script type='text/javascript' src='//hootpreceding.com/75/37/67/7537671fc8b8445af473b6f7f5566a17.js'></script>
  <script type='text/javascript' src='//hootpreceding.com/75/37/67/7537671fc8b8445af473b6f7f5566a17.js'></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Image Cropper & Resizer</title>
  <!-- ✅ Link favicon from 'favicon' folder -->
  <link rel="icon" href="favicon/favicon.png" type="image/png"> 
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    }

    body {
      background-color: #f0f4f8;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background-color: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
      max-width: 800px;
      width: 100%;
      text-align: center;
    }

    h1 {
      color: #007bff;
      font-size: 1.8rem;
      margin-bottom: 20px;
    }

    .upload-area {
      border: 2px dashed #007bff;
      padding: 25px;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      margin-bottom: 20px;
    }

    .upload-area:hover, .upload-area.dragover {
      background-color: #e6f0ff;
    }

    .upload-area p {
      color: #666;
      font-size: 1rem;
    }

    .canvas-container {
      position: relative;
      display: inline-block;
      margin: 20px 0;
    }

    #imageCanvas {
      max-width: 100%;
      max-height: 400px;
      border-radius: 8px;
      display: none;
    }

    #cropBox {
      position: absolute;
      border: 2px solid #007bff;
      background: rgba(0, 123, 255, 0.2);
      cursor: move;
      display: none;
    }

    .crop-handle {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #007bff;
      border-radius: 50%;
      cursor: pointer;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-size: 0.9rem;
      color: #333;
      text-align: left;
    }

    input[type="number"], button {
      padding: 10px;
      border: 1px solid #007bff;
      border-radius: 6px;
      font-size: 1rem;
      outline: none;
    }

    input[type="number"] {
      width: 100%;
    }

    input[type="checkbox"] {
      margin-left: 10px;
    }

    button {
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      transition: background-color 0.3s ease;
      grid-column: span 2;
    }

    button:hover {
      background-color: #0056b3;
    }

    button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }

    .image-info {
      color: #666;
      font-size: 0.9rem;
      margin-top: 10px;
    }

    .error {
      color: #d32f2f;
      font-size: 0.9rem;
      margin-top: 10px;
      display: none;
    }

    #previewCanvas {
      max-width: 100%;
      max-height: 200px;
      border-radius: 8px;
      margin-top: 10px;
      display: none;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      h1 {
        font-size: 1.5rem;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      button {
        grid-column: span 1;
      }

      .upload-area {
        padding: 15px;
      }

      .upload-area p {
        font-size: 0.9rem;
      }

      #imageCanvas {
        max-height: 300px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Smart Image Cropper & Resizer</h1>
    <div class="upload-area" id="uploadArea">
      <p>Click or Drag & Drop an image (JPG, PNG, WEBP)</p>
      <input type="file" id="imageInput" accept="image/jpeg,image/png,image/webp" style="display: none;">
    </div>
    <div class="canvas-container">
      <canvas id="imageCanvas"></canvas>
      <div id="cropBox">
        <div class="crop-handle" id="topLeft"></div>
        <div class="crop-handle" id="topRight" style="right: -6px;"></div>
        <div class="crop-handle" id="bottomLeft" style="bottom: -6px;"></div>
        <div class="crop-handle" id="bottomRight" style="right: -6px; bottom: -6px;"></div>
      </div>
    </div>
    <canvas id="previewCanvas"></canvas>
    <div class="controls">
      <div class="control-group">
        <label for="widthInput">Width (px)</label>
        <input type="number" id="widthInput" placeholder="Enter width" min="1">
      </div>
      <div class="control-group">
        <label for="heightInput">Height (px)</label>
        <input type="number" id="heightInput" placeholder="Enter height" min="1">
      </div>
      <div class="control-group">
        <label for="lockAspectRatio">
          Lock Aspect Ratio
          <input type="checkbox" id="lockAspectRatio" checked>
        </label>
      </div>
      <button id="cropBtn" disabled>Crop & Resize</button>
    </div>
    <div class="image-info" id="imageInfo">Image Info: --</div>
    <div class="error" id="errorMessage">Unsupported file type. Please use JPG, PNG, or WEBP.</div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const imageInput = document.getElementById('imageInput');
    const imageCanvas = document.getElementById('imageCanvas');
    const cropBox = document.getElementById('cropBox');
    const previewCanvas = document.getElementById('previewCanvas');
    const widthInput = document.getElementById('widthInput');
    const heightInput = document.getElementById('heightInput');
    const lockAspectRatio = document.getElementById('lockAspectRatio');
    const cropBtn = document.getElementById('cropBtn');
    const imageInfo = document.getElementById('imageInfo');
    const errorMessage = document.getElementById('errorMessage');

    let currentImage = null;
    let originalWidth = 0;
    let originalHeight = 0;
    let originalFileSize = 0;
    let cropX = 0, cropY = 0, cropWidth = 0, cropHeight = 0;
    let aspectRatio = 1;
    let isDragging = false, isResizing = false, resizeHandle = null;
    let startX, startY;

    const ctx = imageCanvas.getContext('2d');
    const previewCtx = previewCanvas.getContext('2d');

    // Handle click to open file picker
    uploadArea.addEventListener('click', () => imageInput.click());

    // Handle drag and drop
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      handleFile(file);
    });

    // Handle file selection
    imageInput.addEventListener('change', () => {
      const file = imageInput.files[0];
      handleFile(file);
    });

    function handleFile(file) {
      if (file && ['image/jpeg', 'image/png', 'image/webp'].includes(file.type)) {
        errorMessage.style.display = 'none';
        originalFileSize = file.size;
        const reader = new FileReader();
        reader.onload = (e) => {
          currentImage = new Image();
          currentImage.src = e.target.result;
          currentImage.onload = () => {
            originalWidth = currentImage.width;
            originalHeight = currentImage.height;
            aspectRatio = originalWidth / originalHeight;
            setupCanvas();
            imageInfo.textContent = `Image Info: ${originalWidth}x${originalHeight}px, ${(originalFileSize / 1024).toFixed(2)} KB, ${file.type.split('/')[1].toUpperCase()}`;
            cropBtn.disabled = false;
          };
        };
        reader.readAsDataURL(file);
      } else {
        errorMessage.style.display = 'block';
        imageCanvas.style.display = 'none';
        cropBox.style.display = 'none';
        previewCanvas.style.display = 'none';
        imageInfo.textContent = 'Image Info: --';
        cropBtn.disabled = true;
      }
    }

    function setupCanvas() {
      const maxWidth = 600;
      const maxHeight = 400;
      const scale = Math.min(maxWidth / originalWidth, maxHeight / originalHeight, 1);
      imageCanvas.width = originalWidth * scale;
      imageCanvas.height = originalHeight * scale;
      imageCanvas.style.display = 'block';
      ctx.drawImage(currentImage, 0, 0, imageCanvas.width, imageCanvas.height);

      // Initialize crop box (50% of image size)
      cropWidth = imageCanvas.width * 0.5;
      cropHeight = imageCanvas.height * 0.5;
      cropX = (imageCanvas.width - cropWidth) / 2;
      cropY = (imageCanvas.height - cropHeight) / 2;
      aspectRatio = cropWidth / cropHeight;
      widthInput.value = Math.round(cropWidth / scale);
      heightInput.value = Math.round(cropHeight / scale);
      updateCropBox();
      updatePreview();
    }

    function updateCropBox() {
      cropBox.style.display = 'block';
      cropBox.style.left = `${cropX}px`;
      cropBox.style.top = `${cropY}px`;
      cropBox.style.width = `${cropWidth}px`;
      cropBox.style.height = `${cropHeight}px`;
    }

    function updatePreview() {
      const scale = imageCanvas.width / originalWidth;
      previewCanvas.width = cropWidth;
      previewCanvas.height = cropHeight;
      previewCanvas.style.display = 'block';
      previewCtx.drawImage(
        imageCanvas,
        cropX, cropY, cropWidth, cropHeight,
        0, 0, cropWidth, cropHeight
      );
    }

    // Crop box dragging
    cropBox.addEventListener('mousedown', (e) => {
      if (e.target.classList.contains('crop-handle')) {
        isResizing = true;
        resizeHandle = e.target.id;
      } else {
        isDragging = true;
      }
      startX = e.clientX;
      startY = e.clientY;
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging && !isResizing) return;
      const rect = imageCanvas.getBoundingClientRect();
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      startX = e.clientX;
      startY = e.clientY;

      if (isDragging) {
        cropX = Math.max(0, Math.min(cropX + dx, imageCanvas.width - cropWidth));
        cropY = Math.max(0, Math.min(cropY + dy, imageCanvas.height - cropHeight));
      } else if (isResizing) {
        let newWidth = cropWidth;
        let newHeight = cropHeight;
        let newX = cropX;
        let newY = cropY;

        if (resizeHandle === 'topLeft' || resizeHandle === 'bottomLeft') {
          newWidth = cropWidth - dx;
          newX = cropX + dx;
        } else {
          newWidth = cropWidth + dx;
        }

        if (resizeHandle === 'topLeft' || resizeHandle === 'topRight') {
          newHeight = cropHeight - dy;
          newY = cropY + dy;
        } else {
          newHeight = cropHeight + dy;
        }

        if (lockAspectRatio.checked) {
          if (resizeHandle === 'topLeft' || resizeHandle === 'bottomRight') {
            newHeight = newWidth / aspectRatio;
            if (resizeHandle === 'topLeft') {
              newY = cropY + (cropHeight - newHeight);
            }
          } else {
            newWidth = newHeight * aspectRatio;
            if (resizeHandle === 'topRight') {
              newX = cropX + (cropWidth - newWidth);
            }
          }
        }

        cropWidth = Math.max(10, Math.min(newWidth, imageCanvas.width - newX));
        cropHeight = Math.max(10, Math.min(newHeight, imageCanvas.height - newY));
        cropX = Math.max(0, Math.min(newX, imageCanvas.width - cropWidth));
        cropY = Math.max(0, Math.min(newY, imageCanvas.height - cropHeight));
      }

      updateCropBox();
      updatePreview();
      const scale = imageCanvas.width / originalWidth;
      widthInput.value = Math.round(cropWidth / scale);
      heightInput.value = Math.round(cropHeight / scale);
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
      isResizing = false;
      resizeHandle = null;
    });

    // Touch support
    cropBox.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      startX = touch.clientX;
      startY = touch.clientY;
      if (e.target.classList.contains('crop-handle')) {
        isResizing = true;
        resizeHandle = e.target.id;
      } else {
        isDragging = true;
      }
      e.preventDefault();
    });

    document.addEventListener('touchmove', (e) => {
      if (!isDragging && !isResizing) return;
      const touch = e.touches[0];
      const dx = touch.clientX - startX;
      const dy = touch.clientY - startY;
      startX = touch.clientX;
      startY = touch.clientY;

      if (isDragging) {
        cropX = Math.max(0, Math.min(cropX + dx, imageCanvas.width - cropWidth));
        cropY = Math.max(0, Math.min(cropY + dy, imageCanvas.height - cropHeight));
      } else if (isResizing) {
        let newWidth = cropWidth;
        let newHeight = cropHeight;
        let newX = cropX;
        let newY = cropY;

        if (resizeHandle === 'topLeft' || resizeHandle === 'bottomLeft') {
          newWidth = cropWidth - dx;
          newX = cropX + dx;
        } else {
          newWidth = cropWidth + dx;
        }

        if (resizeHandle === 'topLeft' || resizeHandle === 'topRight') {
          newHeight = cropHeight - dy;
          newY = cropY + dy;
        } else {
          newHeight = cropHeight + dy;
        }

        if (lockAspectRatio.checked) {
          if (resizeHandle === 'topLeft' || resizeHandle === 'bottomRight') {
            newHeight = newWidth / aspectRatio;
            if (resizeHandle === 'topLeft') {
              newY = cropY + (cropHeight - newHeight);
            }
          } else {
            newWidth = newHeight * aspectRatio;
            if (resizeHandle === 'topRight') {
              newX = cropX + (cropWidth - newWidth);
            }
          }
        }

        cropWidth = Math.max(10, Math.min(newWidth, imageCanvas.width - newX));
        cropHeight = Math.max(10, Math.min(newHeight, imageCanvas.height - newY));
        cropX = Math.max(0, Math.min(newX, imageCanvas.width - cropWidth));
        cropY = Math.max(0, Math.min(newY, imageCanvas.height - cropHeight));
      }

      updateCropBox();
      updatePreview();
      const scale = imageCanvas.width / originalWidth;
      widthInput.value = Math.round(cropWidth / scale);
      heightInput.value = Math.round(cropHeight / scale);
    });

    document.addEventListener('touchend', () => {
      isDragging = false;
      isResizing = false;
      resizeHandle = null;
    });

    // Maintain aspect ratio for inputs
    widthInput.addEventListener('input', () => {
      if (lockAspectRatio.checked && widthInput.value) {
        heightInput.value = Math.round(widthInput.value / aspectRatio);
      }
    });

    heightInput.addEventListener('input', () => {
      if (lockAspectRatio.checked && heightInput.value) {
        widthInput.value = Math.round(heightInput.value * aspectRatio);
      }
    });

    // Handle crop and resize
    cropBtn.addEventListener('click', () => {
      if (!currentImage) return;

      const scale = imageCanvas.width / originalWidth;
      const targetWidth = widthInput.value ? parseInt(widthInput.value) : cropWidth / scale;
      const targetHeight = heightInput.value ? parseInt(heightInput.value) : cropHeight / scale;

      const outputCanvas = document.createElement('canvas');
      outputCanvas.width = targetWidth;
      outputCanvas.height = targetHeight;
      const outputCtx = outputCanvas.getContext('2d');
      outputCtx.drawImage(
        currentImage,
        cropX / scale, cropY / scale, cropWidth / scale, cropHeight / scale,
        0, 0, targetWidth, targetHeight
      );

      const mimeType = currentImage.src.startsWith('data:image/webp') ? 'image/webp' : 'image/jpeg';
      const extension = mimeType.split('/')[1];
      outputCanvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `cropped-image.${extension}`;
        a.click();
        URL.revokeObjectURL(url);
        imageInfo.textContent = `Image Info: ${targetWidth}x${targetHeight}px, ${(blob.size / 1024).toFixed(2)} KB (Original: ${(originalFileSize / 1024).toFixed(2)} KB), ${extension.toUpperCase()}`;
      }, mimeType, 0.9);
    });
  </script>
</body>
</html>
