<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://pl27141191.profitablecpmratenetwork.com/d3/ab/4b/d3ab4b09d03feca982585e31ef1d8e1e.js"></script>
  <link rel="icon" type="image/png" href="favicon.logo.png"> 
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Resizer – KB</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #16171b;
      --surface2: #1e2028;
      --border: #2a2c35;
      --accent: #4ade80;
      --accent2: #22d3ee;
      --accent-dim: rgba(74,222,128,0.10);
      --text: #f0f0f2;
      --muted: #7b7f8e;
      --danger: #f87171;
      --success: #4ade80;
      --radius: 16px;
    }

    html, body {
      margin: 0; padding: 0;
      overflow-x: hidden;
      width: 100%;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 30px 16px;
    }

    .card {
      width: 100%;
      max-width: 500px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 28px;
      /* Removed huge box-shadow spread that caused overflow */
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 26px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-dim);
      border: 1px solid rgba(74,222,128,0.22);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      padding: 5px 13px;
      border-radius: 100px;
      margin-bottom: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .badge-dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,100%{ opacity:1; transform:scale(1); }
      50%{ opacity:0.4; transform:scale(0.7); }
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: var(--text);
      margin-bottom: 6px;
    }

    h1 span { color: var(--accent); }

    .sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── Upload zone ── */
    .upload-zone {
      display: block;
      width: 100%;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface2);
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 18px;
    }

    .upload-zone:hover, .upload-zone.drag {
      border-color: var(--accent);
      background: rgba(74,222,128,0.04);
    }

    .upload-zone input { display: none; }

    .upload-icon {
      width: 50px; height: 50px;
      background: var(--accent-dim);
      border: 1px solid rgba(74,222,128,0.2);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 22px;
    }

    .upload-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .upload-hint {
      font-size: 12px;
      color: var(--muted);
    }

    .upload-hint span { color: var(--accent); font-weight: 600; }

    /* ── Preview ── */
    .preview-wrap {
      display: none;
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      background: #000;
      max-height: 220px;
    }

    .preview-wrap img {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      display: block;
    }

    /* ── Info bar ── */
    .info-bar {
      display: none;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 20px;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .info-bar.show { display: grid; }

    .info-item { text-align: center; }

    .info-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .info-value {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .info-value.green { color: var(--accent); }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Form ── */
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .size-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      width: 100%;
    }

    .size-row input[type="number"] {
      flex: 1;
      min-width: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -moz-appearance: textfield;
    }

    .size-row input[type="number"]::-webkit-inner-spin-button,
    .size-row input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    .size-row input[type="number"]::placeholder { color: var(--muted); font-weight: 400; }

    .size-row input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(74,222,128,0.12);
    }

    .unit-toggle {
      display: flex;
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .unit-btn {
      padding: 13px 20px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .unit-btn.active {
      background: var(--accent);
      color: #0d0d0f;
    }

    /* ── Buttons ── */
    .btn-resize {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .btn-resize:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-resize:active { transform: translateY(0); }
    .btn-resize:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.25);
      border-top-color: #0d0d0f;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-download {
      display: none;
      width: 100%;
      padding: 13px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: background 0.2s, border-color 0.2s;
      margin-bottom: 12px;
    }

    .btn-download:hover {
      background: rgba(255,255,255,0.05);
      border-color: var(--accent2);
    }

    .btn-download.show { display: block; }

    /* ── Message ── */
    .msg {
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 14px;
      border-radius: 10px;
      display: none;
      line-height: 1.5;
    }

    .msg.success { background: rgba(74,222,128,0.1);  color: var(--success); display: block; }
    .msg.error   { background: rgba(248,113,113,0.1); color: var(--danger);  display: block; }
    .msg.warn    { background: rgba(251,191,36,0.1);  color: #fbbf24;        display: block; }

    canvas { display: none; }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .card { padding: 24px 18px; border-radius: 20px; }
      h1 { font-size: 22px; }
      .unit-btn { padding: 13px 16px; }
      .info-bar { grid-template-columns: 1fr 1fr; }
      .info-bar .info-item:last-child {
        grid-column: span 2;
        border-top: 1px solid var(--border);
        padding-top: 10px;
      }
    }
  </style>
</head>
<body>

<div class="card">

  <div class="header">
    <div class="badge"><span class="badge-dot"></span> Free Tool</div>
    <h1>Image <span>Resizer</span></h1>
    <p class="sub">Compress JPG, PNG &amp; WEBP to an exact KB target — right in your browser</p>
  </div>

  <!-- Upload -->
  <label class="upload-zone" id="uploadZone">
    <input type="file" id="imageInput" accept="image/*">
    <div class="upload-icon">🖼️</div>
    <div class="upload-title">Click to upload or drag &amp; drop</div>
    <div class="upload-hint">JPG, PNG, WEBP &nbsp;·&nbsp; <span>Any size</span></div>
  </label>

  <!-- Preview -->
  <div class="preview-wrap" id="previewWrap">
    <img id="previewImg" alt="Preview">
  </div>

  <!-- Info -->
  <div class="info-bar" id="infoBar">
    <div class="info-item">
      <div class="info-label">Original</div>
      <div class="info-value" id="iOriginal">—</div>
    </div>
    <div class="info-item">
      <div class="info-label">Output</div>
      <div class="info-value green" id="iOutput">—</div>
    </div>
    <div class="info-item">
      <div class="info-label">Dimensions</div>
      <div class="info-value" id="iDims">—</div>
    </div>
  </div>

  <div class="divider">Target size</div>

  <label class="form-label">Enter the size you want</label>
  <div class="size-row">
    <input type="number" id="targetSize" placeholder="e.g. 200 (max 1000)" min="1" max="1000" step="any">
    <div class="unit-toggle">
      <button class="unit-btn active" id="btnKB">KB</button>
    </div>
  </div>

  <button class="btn-resize" id="btnResize" onclick="resizeImage()">
    <span class="spinner" id="spinner"></span>
    <span id="btnLabel">⚡ Resize Image</span>
  </button>

  <a class="btn-download" id="btnDownload" download="resized-image.jpg">⬇ Download Resized Image</a>

  <div class="msg" id="msg"></div>

  <canvas id="canvas"></canvas>
</div>

<script>
  let uploadedImage = null;
  let originalSizeKB = 0;
  const imageInput  = document.getElementById('imageInput');
  const uploadZone  = document.getElementById('uploadZone');
  const previewWrap = document.getElementById('previewWrap');
  const previewImg  = document.getElementById('previewImg');
  const infoBar     = document.getElementById('infoBar');
  const iOriginal   = document.getElementById('iOriginal');
  const iOutput     = document.getElementById('iOutput');
  const iDims       = document.getElementById('iDims');
  const targetIn    = document.getElementById('targetSize');
  const btnResize   = document.getElementById('btnResize');
  const btnLabel    = document.getElementById('btnLabel');
  const spinner     = document.getElementById('spinner');
  const btnDownload = document.getElementById('btnDownload');
  const msgEl       = document.getElementById('msg');
  const canvas      = document.getElementById('canvas');
  const ctx         = canvas.getContext('2d');

  /* Drag & drop */
  uploadZone.addEventListener('dragover',  e => { e.preventDefault(); uploadZone.classList.add('drag'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (f) handleFile(f);
  });

  imageInput.addEventListener('change', function () {
    if (this.files[0]) handleFile(this.files[0]);
  });

  function handleFile(file) {
    if (!file.type.startsWith('image/')) {
      showMsg('Please upload a valid image (JPG, PNG, WEBP).', 'error');
      return;
    }
    clearMsg();
    btnDownload.classList.remove('show');
    iOutput.textContent = '—';
    originalSizeKB = file.size / 1024;

    const reader = new FileReader();
    reader.onload = e => {
      uploadedImage = new Image();
      uploadedImage.onload = () => {
        previewImg.src = e.target.result;
        previewWrap.style.display = 'block';
        infoBar.classList.add('show');
        iOriginal.textContent = fmt(originalSizeKB);
        iDims.textContent = uploadedImage.width + ' × ' + uploadedImage.height;
      };
      uploadedImage.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function resizeImage() {
    if (!uploadedImage) { showMsg('Please upload an image first.', 'error'); return; }

    const raw = parseFloat(targetIn.value);
    if (!raw || raw <= 0) { showMsg('Enter a valid target size greater than 0.', 'error'); return; }
    if (raw > 1000) { showMsg('Maximum allowed size is 1000 KB.', 'error'); return; }

    const targetKB = raw;

    clearMsg();

    setBusy(true);

    setTimeout(() => {
      try {
        const result = compress(uploadedImage, targetKB);
        finalize(result);
      } catch (err) {
        showMsg('Compression failed. Try a different image.', 'error');
        setBusy(false);
      }
    }, 30);
  }

  function compress(img, targetKB) {
    canvas.width  = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0, img.width, img.height);

    /* Binary search quality at full resolution */
    let lo = 0.01, hi = 0.99, quality = 0.85;
    let dataUrl, sizeKB;

    for (let i = 0; i < 20; i++) {
      quality = (lo + hi) / 2;
      dataUrl = canvas.toDataURL('image/jpeg', quality);
      sizeKB  = getKB(dataUrl);
      if (Math.abs(sizeKB - targetKB) < 1) break;
      if (sizeKB > targetKB) hi = quality;
      else lo = quality;
    }

    /* If still over target, scale down dimensions */
    if (sizeKB > targetKB) {
      let scale = 0.95;
      while (sizeKB > targetKB && scale > 0.05) {
        const newW = Math.max(50, Math.round(img.width  * scale));
        const newH = Math.max(50, Math.round(img.height * scale));
        canvas.width  = newW;
        canvas.height = newH;
        ctx.drawImage(img, 0, 0, newW, newH);

        lo = 0.01; hi = 0.99;
        for (let i = 0; i < 20; i++) {
          quality = (lo + hi) / 2;
          dataUrl = canvas.toDataURL('image/jpeg', quality);
          sizeKB  = getKB(dataUrl);
          if (Math.abs(sizeKB - targetKB) < 1) break;
          if (sizeKB > targetKB) hi = quality;
          else lo = quality;
        }
        scale -= 0.05;
      }
    }

    return { dataUrl, sizeKB, width: canvas.width, height: canvas.height };
  }

  function finalize({ dataUrl, sizeKB, width, height }) {
    previewImg.src = dataUrl;
    iOutput.textContent = fmt(sizeKB);
    iDims.textContent   = width + ' × ' + height;
    infoBar.classList.add('show');

    btnDownload.href     = dataUrl;
    btnDownload.download = 'resized-' + width + 'x' + height + '.jpg';
    btnDownload.classList.add('show');

    if (!msgEl.classList.contains('warn')) {
      showMsg('✓ Done! Resized to ' + fmt(sizeKB) + ' — ready to download.', 'success');
    }
    setBusy(false);
  }

  function getKB(dataUrl) {
    const b64 = dataUrl.split(',')[1];
    const pad = b64.endsWith('==') ? 2 : b64.endsWith('=') ? 1 : 0;
    return (b64.length * 0.75 - pad) / 1024;
  }

  function fmt(kb) {
    return kb >= 1024 ? (kb / 1024).toFixed(2) + ' MB' : kb.toFixed(1) + ' KB';
  }

  function showMsg(text, type) {
    msgEl.textContent = text;
    msgEl.className   = 'msg ' + type;
  }

  function clearMsg() {
    msgEl.className   = 'msg';
    msgEl.textContent = '';
  }

  function setBusy(on) {
    btnResize.disabled       = on;
    spinner.style.display    = on ? 'block' : 'none';
    btnLabel.textContent     = on ? 'Compressing…' : '⚡ Resize Image';
  }
</script>

</body>
</html>
