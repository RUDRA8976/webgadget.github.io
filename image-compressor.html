<!DOCTYPE html>
<html lang="en">
<head>
  <script type='text/javascript' src='//hootpreceding.com/75/37/67/7537671fc8b8445af473b6f7f5566a17.js'></script>
  <script type='text/javascript' src='//hootpreceding.com/75/37/67/7537671fc8b8445af473b6f7f5566a17.js'></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Image Compressor</title>
<link rel="icon" type="image/png" href="favicon.logo.png"> 
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    }

    body {
      background-color: #f0f4f8;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background-color: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
      max-width: 700px;
      width: 100%;
      text-align: center;
    }

    h1 {
      color: #007bff;
      font-size: 1.8rem;
      margin-bottom: 20px;
    }

    .upload-area {
      border: 2px dashed #007bff;
      padding: 25px;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      margin-bottom: 20px;
    }

    .upload-area:hover, .upload-area.dragover {
      background-color: #e6f0ff;
    }

    .upload-area p {
      color: #666;
      font-size: 1rem;
    }

    #imagePreview {
      max-width: 100%;
      max-height: 300px;
      margin: 20px 0;
      border-radius: 8px;
      object-fit: contain;
      display: none;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-size: 0.9rem;
      color: #333;
      text-align: left;
    }

    input[type="range"], select, button {
      padding: 10px;
      border: 1px solid #007bff;
      border-radius: 6px;
      font-size: 1rem;
      outline: none;
    }

    select {
      width: 100%;
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    button {
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      transition: background-color 0.3s ease;
      grid-column: span 2;
    }

    button:hover {
      background-color: #0056b3;
    }

    button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }

    .image-info {
      color: #666;
      font-size: 0.9rem;
      margin-top: 10px;
    }

    .error {
      color: #d32f2f;
      font-size: 0.9rem;
      margin-top: 10px;
      display: none;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      h1 {
        font-size: 1.5rem;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      button {
        grid-column: span 1;
      }

      .upload-area {
        padding: 15px;
      }

      .upload-area p {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pro Image Compressor</h1>
    <div class="upload-area" id="uploadArea">
      <p>Click or Drag & Drop an image (JPG, PNG, WEBP)</p>
      <input type="file" id="imageInput" accept="image/jpeg,image/png,image/webp" style="display: none;">
    </div>
    <img id="imagePreview" alt="Image Preview">
    <div class="controls">
      <div class="control-group">
        <label for="formatSelect">Output Format</label>
        <select id="formatSelect">
          <option value="image/jpeg">JPG</option>
          <option value="image/png">PNG</option>
          <option value="image/webp">WEBP</option>
        </select>
      </div>
      <div class="control-group slider-container">
        <label for="qualitySlider">Quality</label>
        <input type="range" id="qualitySlider" min="50" max="100" value="90">
        <span id="qualityValue">90%</span>
      </div>
      <button id="compressBtn" disabled>Compress & Download</button>
    </div>
    <div class="image-info" id="imageInfo">Image Info: --</div>
    <div class="error" id="errorMessage">Unsupported file type. Please use JPG, PNG, or WEBP.</div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const imageInput = document.getElementById('imageInput');
    const imagePreview = document.getElementById('imagePreview');
    const formatSelect = document.getElementById('formatSelect');
    const qualitySlider = document.getElementById('qualitySlider');
    const qualityValue = document.getElementById('qualityValue');
    const compressBtn = document.getElementById('compressBtn');
    const imageInfo = document.getElementById('imageInfo');
    const errorMessage = document.getElementById('errorMessage');

    let currentImage = null;
    let originalWidth = 0;
    let originalHeight = 0;
    let originalFileSize = 0;

    // Update quality display
    qualitySlider.addEventListener('input', () => {
      qualityValue.textContent = `${qualitySlider.value}%`;
    });

    // Handle click to open file picker
    uploadArea.addEventListener('click', () => imageInput.click());

    // Handle drag and drop
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      handleFile(file);
    });

    // Handle file selection
    imageInput.addEventListener('change', () => {
      const file = imageInput.files[0];
      handleFile(file);
    });

    function handleFile(file) {
      if (file && ['image/jpeg', 'image/png', 'image/webp'].includes(file.type)) {
        errorMessage.style.display = 'none';
        originalFileSize = file.size;
        const reader = new FileReader();
        reader.onload = (e) => {
          currentImage = new Image();
          currentImage.src = e.target.result;
          currentImage.onload = () => {
            imagePreview.src = currentImage.src;
            imagePreview.style.display = 'block';
            originalWidth = currentImage.width;
            originalHeight = currentImage.height;
            formatSelect.value = file.type;
            imageInfo.textContent = `Image Info: ${originalWidth}x${originalHeight}px, ${(originalFileSize / 1024).toFixed(2)} KB, ${file.type.split('/')[1].toUpperCase()}`;
            compressBtn.disabled = false;
          };
        };
        reader.readAsDataURL(file);
      } else {
        errorMessage.style.display = 'block';
        imagePreview.style.display = 'none';
        imageInfo.textContent = 'Image Info: --';
        compressBtn.disabled = true;
      }
    }

    // Handle compression
    compressBtn.addEventListener('click', () => {
      if (!currentImage) return;

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = originalWidth;
      canvas.height = originalHeight;
      ctx.drawImage(currentImage, 0, 0, originalWidth, originalHeight);

      const quality = qualitySlider.value / 100;
      const mimeType = formatSelect.value;
      const extension = mimeType.split('/')[1];
      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `compressed-image.${extension}`;
        a.click();
        URL.revokeObjectURL(url);
        imageInfo.textContent = `Image Info: ${originalWidth}x${originalHeight}px, ${(blob.size / 1024).toFixed(2)} KB (Original: ${(originalFileSize / 1024).toFixed(2)} KB), ${extension.toUpperCase()}`;
      }, mimeType, quality);
    });
  </script>
</body>
</html>
