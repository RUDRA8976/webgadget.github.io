<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.logo.png"> 
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Passport Photo Generator</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#4b2e1f;
      color:#fff;
      min-height:100vh;
      padding:20px;
    }

    .container{
      max-width:1200px;
      margin:auto;
    }

    .title{
      text-align:center;
      margin-bottom:25px;
    }

    .title h1{
      font-size:2rem;
      margin-bottom:8px;
    }

    .title p{
      color:#f3e7dd;
      font-size:0.95rem;
    }

    .card{
      background:#fff;
      color:#222;
      border-radius:18px;
      padding:22px;
      margin-bottom:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    .controls{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:18px;
      margin-top:20px;
    }

    .form-group{
      display:flex;
      flex-direction:column;
    }

    label{
      font-weight:600;
      margin-bottom:8px;
      font-size:0.95rem;
    }

    input,
    select{
      padding:12px;
      border:1px solid #ccc;
      border-radius:10px;
      font-size:15px;
      outline:none;
    }

    input:focus,
    select:focus{
      border-color:#6d3f27;
    }

    .btn-group{
      display:flex;
      flex-wrap:wrap;
      gap:14px;
      margin-top:24px;
    }

    button{
      border:none;
      padding:13px 22px;
      border-radius:12px;
      cursor:pointer;
      font-size:15px;
      font-weight:600;
      transition:0.3s;
    }

    .primary-btn{
      background:#6d3f27;
      color:#fff;
    }

    .primary-btn:hover{
      background:#5a321e;
    }

    .secondary-btn{
      background:#e7d4c7;
      color:#3a2418;
    }

    .secondary-btn:hover{
      background:#d8c1b2;
    }

    .preview-wrapper{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      margin-top:20px;
    }

    .preview-box{
      background:#fafafa;
      border-radius:16px;
      padding:15px;
      border:1px solid #ddd;
    }

    .preview-box h3{
      margin-bottom:12px;
      color:#4b2e1f;
    }

    canvas{
      width:100%;
      border-radius:10px;
      border:1px solid #ccc;
      background:#fff;
    }

    .note{
      margin-top:15px;
      font-size:0.9rem;
      color:#555;
      line-height:1.5;
    }

    @media(max-width:768px){
      .preview-wrapper{
        grid-template-columns:1fr;
      }

      .title h1{
        font-size:1.6rem;
      }

      button{
        width:100%;
      }
    }
  </style>
</head>
<body>

  <main class="container">

    <section class="title">
      <h1>Passport Size Photo Generator</h1>
      <p>Create printable passport photo sheets instantly</p>
    </section>

    <section class="card">

      <!-- Upload -->
      <div class="form-group">
        <label for="upload">Upload Photo</label>
        <input
          type="file"
          id="upload"
          accept="image/png, image/jpeg"
          aria-label="Upload passport image"
        >
      </div>

      <!-- Controls -->
      <div class="controls">

        <div class="form-group">
          <label for="photoWidth">Photo Width (cm)</label>
          <input type="number" id="photoWidth" value="3.5" step="0.1">
        </div>

        <div class="form-group">
          <label for="photoHeight">Photo Height (cm)</label>
          <input type="number" id="photoHeight" value="4.5" step="0.1">
        </div>

        <div class="form-group">
          <label for="sheetType">Sheet Size</label>
          <select id="sheetType">
            <option value="4x6">4x6 Inch</option>
            <option value="a4">A4 Sheet</option>
          </select>
        </div>

        <div class="form-group">
          <label for="columns">Columns</label>
          <input type="number" id="columns" value="2" min="1">
        </div>

        <div class="form-group">
          <label for="rows">Rows</label>
          <input type="number" id="rows" value="4" min="1">
        </div>

        <div class="form-group">
          <label for="rotateRange">Rotate Image</label>
          <input type="range" id="rotateRange" min="-180" max="180" value="0">
        </div>

      </div>

      <!-- Buttons -->
      <div class="btn-group">
        <button class="primary-btn" id="generateBtn">
          Generate Passport Sheet
        </button>

        <button class="secondary-btn" id="downloadBtn">
          Download PNG
        </button>
      </div>

    </section>

    <!-- Preview -->
    <section class="preview-wrapper">

      <div class="preview-box">
        <h3>Uploaded Image</h3>
        <canvas id="previewCanvas"></canvas>
      </div>

      <div class="preview-box">
        <h3>Printable Passport Sheet</h3>
        <canvas id="sheetCanvas"></canvas>

        <div class="note">
          Standard Indian Passport Photo Size:
          <strong>3.5 cm × 4.5 cm</strong>
        </div>
      </div>

    </section>

  </main>

  <script>
    const uploadInput = document.getElementById("upload");
    const previewCanvas = document.getElementById("previewCanvas");
    const sheetCanvas = document.getElementById("sheetCanvas");

    const previewCtx = previewCanvas.getContext("2d");
    const sheetCtx = sheetCanvas.getContext("2d");

    const generateBtn = document.getElementById("generateBtn");
    const downloadBtn = document.getElementById("downloadBtn");

    let uploadedImage = null;

    // =========================
    // Upload Image
    // =========================
    uploadInput.addEventListener("change", function(e){

      const file = e.target.files[0];

      if(!file) return;

      const reader = new FileReader();

      reader.onload = function(event){

        const img = new Image();

        img.onload = function(){

          uploadedImage = img;
          drawPreview();
        };

        img.src = event.target.result;
      };

      reader.readAsDataURL(file);
    });

    // =========================
    // Draw Preview
    // =========================
    function drawPreview(){

      if(!uploadedImage) return;

      previewCanvas.width = 300;
      previewCanvas.height = 400;

      previewCtx.clearRect(0,0,300,400);

      const rotation =
        parseInt(document.getElementById("rotateRange").value);

      previewCtx.save();

      previewCtx.translate(
        previewCanvas.width/2,
        previewCanvas.height/2
      );

      previewCtx.rotate(rotation * Math.PI / 180);

      previewCtx.drawImage(
        uploadedImage,
        -120,
        -160,
        240,
        320
      );

      previewCtx.restore();
    }

    // Rotate Preview Live
    document.getElementById("rotateRange")
      .addEventListener("input", drawPreview);

    // =========================
    // Generate Passport Sheet
    // =========================
    generateBtn.addEventListener("click", function(){

      if(!uploadedImage){
        alert("Please upload an image first.");
        return;
      }

      const widthCM =
        parseFloat(document.getElementById("photoWidth").value);

      const heightCM =
        parseFloat(document.getElementById("photoHeight").value);

      const cols =
        parseInt(document.getElementById("columns").value);

      const rows =
        parseInt(document.getElementById("rows").value);

      const sheetType =
        document.getElementById("sheetType").value;

      const rotation =
        parseInt(document.getElementById("rotateRange").value);

      // 300 DPI print quality
      const dpi = 300;

      // Convert CM to PX
      const photoWidthPX =
        Math.round((widthCM / 2.54) * dpi);

      const photoHeightPX =
        Math.round((heightCM / 2.54) * dpi);

      let sheetWidth;
      let sheetHeight;

      // Sheet sizes
      if(sheetType === "4x6"){
        sheetWidth = 1800;
        sheetHeight = 1200;
      } else {
        // A4 at 300 DPI
        sheetWidth = 2480;
        sheetHeight = 3508;
      }

      sheetCanvas.width = sheetWidth;
      sheetCanvas.height = sheetHeight;

      // Background
      sheetCtx.fillStyle = "#ffffff";
      sheetCtx.fillRect(0,0,sheetWidth,sheetHeight);

      const margin = 50;
      const spacing = 40;

      let startX = margin;
      let startY = margin;

      // Draw Photos
      for(let r = 0; r < rows; r++){

        for(let c = 0; c < cols; c++){

          const x =
            startX + c * (photoWidthPX + spacing);

          const y =
            startY + r * (photoHeightPX + spacing);

          // Crop Marks
          sheetCtx.strokeStyle = "#999";
          sheetCtx.strokeRect(
            x,
            y,
            photoWidthPX,
            photoHeightPX
          );

          // Draw Rotated Image
          sheetCtx.save();

          sheetCtx.translate(
            x + photoWidthPX / 2,
            y + photoHeightPX / 2
          );

          sheetCtx.rotate(rotation * Math.PI / 180);

          sheetCtx.drawImage(
            uploadedImage,
            -photoWidthPX / 2,
            -photoHeightPX / 2,
            photoWidthPX,
            photoHeightPX
          );

          sheetCtx.restore();
        }
      }

      alert("Passport sheet generated successfully!");
    });

    // =========================
    // Download Sheet
    // =========================
    downloadBtn.addEventListener("click", function(){

      const link = document.createElement("a");

      link.download = "passport-photo-sheet.png";

      link.href = sheetCanvas.toDataURL("image/png");

      link.click();
    });

  </script>

</body>
</html>
